# ─────────────────────────────────────────────────────────────────────────────
# API Gateway — application.yml
#
# SSL NOTE:
#   By default SSL is enabled (server.ssl.enabled: true).
#   For local development the keystore is generated by:
#     bash infrastructure/certs/generate-certs.sh
#   and the path/password are injected via SSL_KEYSTORE_PATH and
#   SSL_KEYSTORE_PASSWORD environment variables (see .env.example).
#   To run without SSL during quick local testing set SSL_ENABLED=false.
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: ${GATEWAY_PORT:8080}
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: ${SSL_KEYSTORE_PATH:classpath:dev-keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:changeme_keystore}
    key-store-type: PKCS12
    key-alias: ecommerce-local

spring:
  application:
    name: gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      globalcors:
        # Ensures CORS headers from gateway and downstream services are not duplicated
        add-to-simple-url-handler-mapping: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      # Routes are defined programmatically in GatewayRoutesConfig; YAML routes are empty
      routes: []

    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: true
        health-check-path: /actuator/health
        health-check-interval: 10s
        instance-id: ${spring.application.name}-${server.port}
      config:
        enabled: false

# ── Actuator & Metrics ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

# ── Resilience4j Circuit Breaker ─────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      default-cb:
        base-config: default

# ── JWT ───────────────────────────────────────────────────────────────────────
# Only the RSA public key is configured here — the private key lives exclusively
# in the User Service. Value must be a PEM-encoded X.509 public key (Base64,
# without -----BEGIN/END----- headers or with them — both are handled).
jwt:
  public-key: ${JWT_PUBLIC_KEY:}

# ── CORS ──────────────────────────────────────────────────────────────────────
allowed:
  origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  config: classpath:logback-spring.xml
