<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Payment Receipt</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; margin: 0; background: #f4f4f5; color: #1a1a2e; }
    .wrapper { max-width: 600px; margin: 32px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.10); }
    .header { background: #16a34a; padding: 28px 32px; }
    .header h1 { margin: 0; color: #fff; font-size: 22px; }
    .body { padding: 32px; }
    .body p { margin: 0 0 12px; line-height: 1.6; }
    .amount-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 20px; text-align: center; margin: 20px 0; }
    .amount-box .label { font-size: 13px; color: #4b5563; text-transform: uppercase; letter-spacing: 0.5px; }
    .amount-box .amount { font-size: 32px; font-weight: 700; color: #16a34a; margin: 4px 0; }
    .meta { background: #f8fafc; border-radius: 6px; padding: 16px; font-size: 13px; }
    .meta div { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #e2e8f0; }
    .meta div:last-child { border-bottom: none; }
    .footer { background: #f8fafc; padding: 20px 32px; font-size: 12px; color: #94a3b8; text-align: center; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header"><h1>💳 Payment Received</h1></div>
  <div class="body">
    <p>Your payment has been successfully processed. Thank you!</p>
    <div class="amount-box">
      <div class="label">Amount Paid</div>
      <div class="amount" th:text="${currency} + ' ' + ${amount}">USD 29.99</div>
    </div>
    <div class="meta">
      <div><span>Order ID</span><span th:text="${orderId}">ORD-XXXXXXXX</span></div>
      <div><span>Payment ID</span><span th:text="${paymentId}">PAY-XXXXXXXX</span></div>
      <div><span>Gateway</span><span th:text="${gateway}">STRIPE</span></div>
      <div><span>Status</span><span style="color:#16a34a;font-weight:600" th:text="${status}">SUCCEEDED</span></div>
    </div>
  </div>
  <div class="footer">E-Commerce Platform · Keep this email as your receipt.</div>
</div>
</body>
</html>
