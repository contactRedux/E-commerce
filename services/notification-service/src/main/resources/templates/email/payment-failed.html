<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Payment Failed</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; margin: 0; background: #f4f4f5; color: #1a1a2e; }
    .wrapper { max-width: 600px; margin: 32px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.10); }
    .header { background: #dc2626; padding: 28px 32px; }
    .header h1 { margin: 0; color: #fff; font-size: 22px; }
    .body { padding: 32px; }
    .body p { margin: 0 0 12px; line-height: 1.6; }
    .alert { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 16px; margin: 20px 0; font-size: 14px; color: #991b1b; }
    .meta { background: #f8fafc; border-radius: 6px; padding: 16px; font-size: 13px; }
    .meta div { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #e2e8f0; }
    .meta div:last-child { border-bottom: none; }
    .footer { background: #f8fafc; padding: 20px 32px; font-size: 12px; color: #94a3b8; text-align: center; }
    .btn { display: inline-block; background: #dc2626; color: #fff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 600; margin-top: 8px; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header"><h1>⚠️ Payment Failed</h1></div>
  <div class="body">
    <div class="alert">
      Your payment could not be processed. Please check your payment details and try again.
    </div>
    <div class="meta">
      <div><span>Order ID</span><span th:text="${orderId}">ORD-XXXXXXXX</span></div>
      <div><span>Amount</span><span th:text="${currency} + ' ' + ${amount}">USD 29.99</span></div>
      <div><span>Gateway</span><span th:text="${gateway}">STRIPE</span></div>
    </div>
    <p style="margin-top:20px">If you continue to have issues, please contact support.</p>
  </div>
  <div class="footer">E-Commerce Platform · Need help? Contact support@ecommerce.local</div>
</div>
</body>
</html>
