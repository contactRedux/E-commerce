openapi: "3.0.3"
info:
  title: Order Service API
  description: |
    Manages the order lifecycle: placement, retrieval, status management, and cancellation.
    Publishes `order.placed` and `order.status.updated` Kafka events on state changes.
  version: "1.0.0"
  contact:
    name: E-Commerce Platform Team

servers:
  - url: http://localhost:8084
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Orders
    description: Order lifecycle management

paths:
  /orders:
    post:
      tags: [Orders]
      summary: Place a new order
      description: |
        Creates a new order from the supplied cart items. Idempotent — if an order with
        the same `idempotencyKey` already exists, the existing order is returned.
      operationId: placeOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderRequest'
      responses:
        "201":
          description: Order successfully placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderApiResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "409":
          $ref: '#/components/responses/Conflict'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Retrieve an order by ID
      description: Customers can only retrieve their own orders. Admins can retrieve any order.
      operationId: getOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderApiResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Orders]
      summary: Cancel an order
      description: |
        Cancels an order. Only orders in `PENDING` or `CONFIRMED` state can be cancelled.
        Customers can only cancel their own orders.
      operationId: cancelOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        "204":
          description: Order successfully cancelled
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /orders/{id}/status:
    put:
      tags: [Orders]
      summary: Update order status (Admin only)
      description: |
        Advances the order through its status lifecycle.
        Valid transitions: `PENDING→CONFIRMED`, `CONFIRMED→SHIPPED`, `SHIPPED→DELIVERED`, any→`CANCELLED`.
      operationId: updateOrderStatus
      security:
        - BearerAuth: [admin]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusRequest'
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderApiResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /orders/user/{userId}:
    get:
      tags: [Orders]
      summary: List orders for a user (paginated)
      description: Customers can only list their own orders. Admins can list orders for any user.
      operationId: getOrdersByUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated list of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedOrderApiResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrderId:
      name: id
      in: path
      required: true
      description: UUID of the order
      schema:
        type: string
        format: uuid

  schemas:
    OrderItemDto:
      type: object
      required: [productId, productName, quantity, unitPrice]
      properties:
        productId:
          type: string
          example: "prod-abc123"
        productName:
          type: string
          example: "Wireless Headphones"
        quantity:
          type: integer
          minimum: 1
          example: 2
        unitPrice:
          type: number
          format: decimal
          minimum: 0.01
          example: 49.99

    PlaceOrderRequest:
      type: object
      required: [userId, items, shippingAddress, idempotencyKey]
      properties:
        userId:
          type: string
          example: "user-uuid-123"
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemDto'
        shippingAddress:
          type: string
          example: "123 Main Street, Springfield, IL 62701"
        idempotencyKey:
          type: string
          description: Unique key to prevent duplicate order placement
          example: "client-generated-uuid-v4"

    UpdateStatusRequest:
      type: object
      required: [newStatus]
      properties:
        newStatus:
          $ref: '#/components/schemas/OrderStatus'

    OrderStatus:
      type: string
      enum: [PENDING, CONFIRMED, SHIPPED, DELIVERED, CANCELLED]
      example: CONFIRMED

    OrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        totalAmount:
          type: number
          format: decimal
          example: 99.98
        shippingAddress:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemDto'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PagedOrderResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderResponse'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
          format: int64

    ApiResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, error]
        data:
          type: object
          nullable: true
        message:
          type: string
          nullable: true

    OrderApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OrderResponse'

    PagedOrderApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PagedOrderResponse'

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            status:
              example: "error"
            data:
              nullable: true
              example: null
            message:
              example: "Descriptive error message"

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Order not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Invalid state transition or duplicate idempotency key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
